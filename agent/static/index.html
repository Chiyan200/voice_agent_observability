<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Voice Agent - Ollama + Whisper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .status-box {
            background: #f0f9ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .status-box h3 {
            color: #1e3a8a;
            margin-bottom: 8px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ef4444;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background: #22c55e;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 2px solid #e5e7eb;
        }

        .tab-btn {
            padding: 12px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #6b7280;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .voice-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e5e7eb;
            color: #374151;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #d1d5db;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn.recording {
            background: #ef4444;
            animation: pulse-btn 1s infinite;
        }

        @keyframes pulse-btn {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            50% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
        }

        .chat-box {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .message {
            margin-bottom: 12px;
            padding: 10px 12px;
            border-radius: 6px;
            word-wrap: break-word;
            font-size: 14px;
        }

        .message.user {
            background: #dbeafe;
            color: #1e40af;
            margin-left: 20px;
            text-align: right;
        }

        .message.assistant {
            background: #d1fae5;
            color: #065f46;
            margin-right: 20px;
        }

        .message.system {
            background: #fef3c7;
            color: #92400e;
            text-align: center;
            font-size: 12px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-group input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-group button {
            padding: 12px 20px;
        }

        .info-box {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #166534;
        }

        .info-box strong {
            display: block;
            margin-bottom: 8px;
        }

        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: loading-dots 1.4s infinite;
        }

        @keyframes loading-dots {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎤 Local Voice Agent</h1>
            <p>Powered by Ollama qwen2.5 + Whisper</p>
        </div>

        <div class="content">
            <!-- Status -->
            <div class="status-box">
                <h3>System Status</h3>
                <div class="status-indicator">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">Connecting...</span>
                </div>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="voice">🎤 Voice Chat</button>
                <button class="tab-btn" data-tab="text">💬 Text Chat</button>
                <button class="tab-btn" data-tab="info">ℹ️ Info</button>
            </div>

            <!-- Voice Tab -->
            <div id="voice" class="tab-content active">
                <div class="voice-controls">
                    <button id="recordBtn" class="btn btn-primary">
                        <span id="recordIcon">🎤</span> Start Recording
                    </button>
                    <button id="stopBtn" class="btn btn-secondary" disabled>
                        ⏹️ Stop
                    </button>
                </div>
                <div class="chat-box" id="voiceChat"></div>
                <p style="font-size: 12px; color: #6b7280; text-align: center;">
                    <span id="recordingStatus">Ready</span>
                </p>
            </div>

            <!-- Text Tab -->
            <div id="text" class="tab-content">
                <div class="chat-box" id="textChat"></div>
                <div class="input-group">
                    <input type="text" id="textInput" placeholder="Type your message..." />
                    <button id="sendBtn" class="btn btn-primary">Send</button>
                </div>
            </div>

            <!-- Info Tab -->
            <div id="info" class="tab-content">
                <div class="info-box">
                    <strong>Configuration:</strong>
                    <div id="configInfo"></div>
                </div>
                <div class="info-box">
                    <strong>Features:</strong>
                    ✅ Real-time speech recognition (Whisper)<br>
                    ✅ Local LLM inference (Ollama)<br>
                    ✅ GPU acceleration (CUDA)<br>
                    ✅ Text & voice chat modes
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const config = {
            apiUrl: window.location.origin,
            wsUrl: `ws://${window.location.host}/ws/agent`
        };

        let audioContext;
        let mediaStream;
        let audioProcessor;
        let socket = null;
        let isRecording = false;

        // DOM Elements
        const recordBtn = document.getElementById('recordBtn');
        const stopBtn = document.getElementById('stopBtn');
        const sendBtn = document.getElementById('sendBtn');
        const textInput = document.getElementById('textInput');
        const voiceChat = document.getElementById('voiceChat');
        const textChat = document.getElementById('textChat');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const recordingStatus = document.getElementById('recordingStatus');
        const configInfo = document.getElementById('configInfo');

        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const tabName = e.target.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                e.target.classList.add('active');
                document.getElementById(tabName).classList.add('active');
            });
        });

        // Initialize
        async function initialize() {
            await checkStatus();
            await loadConfig();
            setupWebSocket();
            setupAudio();
            setupEventListeners();
        }

        async function checkStatus() {
            try {
                const response = await fetch(`${config.apiUrl}/health/ollama`);
                const data = await response.json();
                
                if (data.status === 'running') {
                    statusDot.classList.add('connected');
                    statusText.textContent = `Connected to Ollama • Model: ${data.target_model}`;
                    console.log('✅ Ollama is running');
                } else {
                    statusText.textContent = `⚠️ ${data.message}`;
                    console.warn('⚠️ Ollama status:', data.message);
                }
            } catch (e) {
                statusText.textContent = '❌ Cannot connect to Ollama';
                console.error('❌ Ollama connection error:', e);
            }
        }

        async function loadConfig() {
            try {
                const response = await fetch(`${config.apiUrl}/api/config`);
                const config = await response.json();
                configInfo.innerHTML = `
                    <strong>Model:</strong> ${config.ollama_model}<br>
                    <strong>API:</strong> ${config.ollama_url}<br>
                    <strong>Whisper:</strong> ${config.whisper_model}<br>
                    <strong>Sample Rate:</strong> ${config.sample_rate} Hz
                `;
                console.log('✅ Configuration loaded');
            } catch (e) {
                configInfo.textContent = 'Unable to load configuration';
                console.error('❌ Config error:', e);
            }
        }

        function setupWebSocket() {
            socket = new WebSocket(config.wsUrl);
            
            socket.onopen = () => {
                console.log('✅ WebSocket connected');
                recordBtn.disabled = false;
            };
            
            socket.onmessage = (event) => {
                console.log('📨 WebSocket message received:', event.data);
                handleWebSocketMessage(event);
            };
            
            socket.onerror = (e) => {
                console.error('❌ WebSocket error:', e);
                recordBtn.disabled = true;
            };
            
            socket.onclose = () => {
                console.log('🔌 WebSocket closed');
                recordBtn.disabled = true;
            };
        }

        function handleWebSocketMessage(event) {
            const data = JSON.parse(event.data);
            console.log('📨 Message type:', data.type);

            if (data.type === 'audio') {
                // Handle audio response
                if (data.audio) {
                    console.log('🔊 Audio response received, size:', data.audio.length, 'chars');
                    try {
                        playAudioResponse(data.audio);
                    } catch (e) {
                        console.error('❌ Audio playback error:', e);
                        recordingStatus.textContent = 'Error playing audio';
                    }
                }
            }
        }

        async function playAudioResponse(base64Audio) {
            try {
                // Decode base64 to binary
                const binaryString = atob(base64Audio);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }

                // Create audio context and play
                const audioData = bytes.buffer;
                audioContext.decodeAudioData(audioData, (decodedData) => {
                    const source = audioContext.createBufferSource();
                    source.buffer = decodedData;
                    source.connect(audioContext.destination);
                    
                    console.log('🔊 Playing audio response...');
                    recordingStatus.textContent = 'Playing response...';
                    source.start(0);
                    
                    // Update status when playback completes
                    source.onended = () => {
                        recordingStatus.textContent = 'Ready';
                        recordBtn.disabled = false;
                        addMessage('Agent response played', 'system', 'voice');
                    };
                }, (error) => {
                    console.error('❌ Audio decode error:', error);
                    recordingStatus.textContent = 'Error decoding audio';
                });
            } catch (e) {
                console.error('❌ Audio playback error:', e);
                recordingStatus.textContent = 'Error playing response';
            }
        }

        async function setupAudio() {
            try {
                console.log('🎤 Requesting microphone access...');
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                console.log('✅ Microphone access granted');

                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(mediaStream);
                
                // Use a buffer to collect audio
                const bufferSize = 4096;
                audioProcessor = audioContext.createScriptProcessor(bufferSize, 1, 1);

                source.connect(audioProcessor);
                audioProcessor.connect(audioContext.destination);

                recordBtn.disabled = false;
                console.log('✅ Audio setup complete');
            } catch (e) {
                console.error('❌ Audio setup error:', e);
                recordBtn.disabled = true;
                statusText.textContent = '❌ Microphone access denied';
            }
        }

        let audioBuffer = [];
        let sampleRate = 16000;

        async function startRecording() {
            if (!audioContext) {
                console.error('❌ AudioContext not initialized');
                statusText.textContent = '❌ Audio not initialized';
                return;
            }

            isRecording = true;
            audioBuffer = [];
            sampleRate = audioContext.sampleRate;

            // Set up audio processing
            audioProcessor.onaudioprocess = (e) => {
                if (!isRecording) return;
                
                const inputData = e.inputBuffer.getChannelData(0);
                // Store audio data
                audioBuffer.push(new Float32Array(inputData));
            };
            
            recordBtn.disabled = true;
            recordBtn.classList.add('recording');
            stopBtn.disabled = false;
            recordingStatus.textContent = '🔴 Recording...';
            addMessage('Listening...', 'system', 'voice');
            
            console.log('🎤 Recording started');
        }

        function stopRecording() {
            if (!isRecording) return;
            
            isRecording = false;
            audioProcessor.onaudioprocess = null;
            
            recordBtn.disabled = false;
            recordBtn.classList.remove('recording');
            stopBtn.disabled = true;
            recordingStatus.textContent = 'Processing...';
            
            console.log('⏹️ Recording stopped, collected', audioBuffer.length, 'chunks');
            
            // Send collected audio
            sendAudioToServer();
        }

        async function sendAudioToServer() {
            if (audioBuffer.length === 0) {
                console.warn('⚠️ No audio data to send');
                recordingStatus.textContent = 'No audio recorded';
                recordBtn.disabled = false;
                return;
            }

            // Combine all audio chunks
            const totalLength = audioBuffer.reduce((sum, chunk) => sum + chunk.length, 0);
            const combined = new Float32Array(totalLength);
            let offset = 0;
            
            for (const chunk of audioBuffer) {
                combined.set(chunk, offset);
                offset += chunk.length;
            }

            console.log('📊 Total audio samples:', totalLength);
            console.log('📊 Duration:', (totalLength / sampleRate).toFixed(2), 'seconds');

            // Convert Float32 to PCM16 (WAV format)
            const wavData = encodeWAV(combined, sampleRate);
            const base64 = arrayBufferToBase64(wavData);

            console.log('📤 Sending audio, base64 size:', base64.length, 'chars');
            recordingStatus.textContent = 'Processing...';
            
            try {
                socket.send(JSON.stringify({ audio: base64 }));
            } catch (e) {
                console.error('❌ Error sending audio:', e);
                recordingStatus.textContent = 'Error sending audio';
                recordBtn.disabled = false;
            }
        }

        function encodeWAV(samples, sampleRate) {
            const buffer = new ArrayBuffer(44 + samples.length * 2);
            const view = new DataView(buffer);

            // WAV header
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };

            writeString(0, 'RIFF');
            view.setUint32(4, 36 + samples.length * 2, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true); // fmt chunk size
            view.setUint16(20, 1, true); // PCM
            view.setUint16(22, 1, true); // mono
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, samples.length * 2, true);

            // Convert Float32 to PCM16
            let index = 44;
            const volume = 0.8;
            for (let i = 0; i < samples.length; i++) {
                const s = Math.max(-1, Math.min(1, samples[i])) * volume;
                view.setInt16(index, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                index += 2;
            }

            return buffer;
        }

        function arrayBufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary);
        }

        function setupEventListeners() {
            recordBtn.addEventListener('click', startRecording);
            stopBtn.addEventListener('click', stopRecording);
            sendBtn.addEventListener('click', sendTextMessage);
            textInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendTextMessage();
            });
        }

        async function sendTextMessage() {
            const text = textInput.value.trim();
            if (!text) return;

            addMessage(text, 'user', 'text');
            textInput.value = '';
            textInput.disabled = true;
            sendBtn.disabled = true;

            console.log('💬 Sending text:', text);

            try {
                const response = await fetch(`${config.apiUrl}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });

                const data = await response.json();
                console.log('📨 Text response:', data);
                
                if (data.status === 'success') {
                    addMessage(data.response, 'assistant', 'text');
                } else {
                    addMessage(`Error: ${data.message}`, 'system', 'text');
                }
            } catch (e) {
                console.error('❌ Text chat error:', e);
                addMessage(`Network error: ${e.message}`, 'system', 'text');
            } finally {
                textInput.disabled = false;
                sendBtn.disabled = false;
                textInput.focus();
            }
        }

        function addMessage(text, role, mode) {
            const chatBox = mode === 'voice' ? voiceChat : textChat;
            const msgEl = document.createElement('div');
            msgEl.className = `message ${role}`;
            msgEl.textContent = text;
            chatBox.appendChild(msgEl);
            chatBox.scrollTop = chatBox.scrollHeight;
            console.log(`💬 Added ${role} message:`, text);
        }

        // Start
        initialize();
    </script>
</body>
</html>
